services:
  - type: web
    name: dongbu-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd app && gunicorn app:app --bind 0.0.0.0:$PORT
    disk:
      name: dongbu-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SP_VACACIONES_URL
        value: ""
